name: Deploy para GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
      - name: Verificar se o build gerou o dist corretamente
        run: |
          echo "--- conteúdo de dist/ ---"
          ls -la dist
          echo "--- dist/index.html ---"
          cat dist/index.html
          if grep -q "src/main.jsx" dist/index.html; then
            echo "ERRO: dist/index.html ainda aponta para o código-fonte não compilado (src/main.jsx)."
            echo "O build do Vite não substituiu o index.html corretamente."
            exit 1
          fi
          if [ ! -d dist/assets ]; then
            echo "ERRO: pasta dist/assets não foi gerada."
            exit 1
          fi
          echo "OK: dist/index.html aponta para os assets compilados."
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
